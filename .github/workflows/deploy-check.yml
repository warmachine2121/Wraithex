name: Build & Deploy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Verify Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Security audit
        run: |
          npm audit --audit-level=critical || echo "⚠️ Critical vulnerabilities found — review before deploying"

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build success
        run: echo "✅ Build passed — safe to deploy to Cloudflare Pages"
