name: Dependency Security Agent

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:       # Manual trigger anytime

jobs:
  audit-and-update:
    name: Audit & Auto-Update Dependencies
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run security audit
        id: audit
        run: |
          echo "## Security Audit Report" >> audit-report.md
          echo "Generated: $(date)" >> audit-report.md
          echo "" >> audit-report.md
          npm audit --json > audit.json 2>/dev/null || true
          VULN_COUNT=$(cat audit.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); const j=JSON.parse(d); console.log(j.metadata?.vulnerabilities?.total ?? 0)")
          echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_ENV
          echo "Total vulnerabilities found: $VULN_COUNT" >> audit-report.md
          npm audit >> audit-report.md 2>&1 || true

      - name: Check for outdated packages
        run: |
          echo "" >> audit-report.md
          echo "## Outdated Packages" >> audit-report.md
          npm outdated >> audit-report.md 2>&1 || true

      - name: Auto-fix vulnerabilities
        run: |
          npm audit fix --save 2>/dev/null || true

      - name: Update Next.js to latest safe version
        run: |
          # Get latest Next.js 15.x version
          LATEST=$(npm show next@15 version 2>/dev/null || echo "15.3.0")
          echo "Latest Next.js 15.x: $LATEST"
          npm install next@$LATEST --save 2>/dev/null || true

      - name: Update React to latest
        run: |
          npm install react@latest react-dom@latest --save 2>/dev/null || true

      - name: Verify build still works
        run: |
          npm run build
        env:
          NODE_ENV: production

      - name: Check if anything changed
        id: changes
        run: |
          if git diff --quiet package.json package-lock.json 2>/dev/null; then
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Create Pull Request if changes exist
        if: env.CHANGED == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: auto-update dependencies and security patches'
          title: '🔒 Security Agent: Dependency Updates Available'
          body: |
            ## Automated Security Update

            This PR was automatically generated by the WRAITHEX Security Agent.

            ### What changed
            - Updated Next.js to latest patched version
            - Updated React to latest stable
            - Applied `npm audit fix` patches

            ### Audit Report
            ```
            $(cat audit-report.md)
            ```

            ### ✅ Build verified
            The build was verified to pass before this PR was created.

            > Merge this PR to keep WRAITHEX secure and up to date.
          branch: security/auto-update-deps
          delete-branch: true
          labels: |
            security
            dependencies
            automated

      - name: Post audit summary to job
        run: |
          echo "### Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Vulnerabilities found:** $VULN_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies changed:** $CHANGED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat audit-report.md >> $GITHUB_STEP_SUMMARY
